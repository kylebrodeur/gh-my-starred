name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run tests
      run: bash test/run.sh
    
    - name: Check executable exists
      run: test -f gh-my-starred && test -x gh-my-starred
    
    - name: Check syntax
      run: bash -n gh-my-starred
